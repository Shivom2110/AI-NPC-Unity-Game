name: Unity Personal CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # allows manual trigger

jobs:
  # -----------------------------
  # C# code checks and CodeQL scan
  # -----------------------------
  code-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up .NET (for C# analyzers)
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '7.0.x'

      - name: Run Roslyn analyzers
        run: |
          dotnet tool install --global dotnet-format
          dotnet format --check

      - name: Run CodeQL scan
        uses: github/codeql-action/init@v2
        with:
          languages: csharp

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v2

  # -----------------------------
  # Unity EditMode tests on macOS
  # -----------------------------
  unity-tests-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Run Unity EditMode tests (Mac)
        run: |
          echo "Running Unity EditMode tests on Mac"
          /Applications/Unity/Hub/Editor/2023.2.0f1/Unity.app/Contents/MacOS/Unity \
          -projectPath $GITHUB_WORKSPACE \
          -runTests \
          -testPlatform EditMode \
          -batchmode \
          -nographics \
          -logFile TestResults-Mac.log \
          -quit

      - name: Upload test results (Mac)
        uses: actions/upload-artifact@v3
        with:
          name: Unity-EditMode-TestResults-Mac
          path: TestResults-Mac.log

  # -----------------------------
  # Unity EditMode tests on Windows
  # -----------------------------
  unity-tests-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Run Unity EditMode tests (Windows)
        run: |
          echo "Running Unity EditMode tests on Windows"
          "C:\Program Files\Unity\Hub\Editor\2023.2.0f1\Editor\Unity.exe" ^
          -projectPath %GITHUB_WORKSPACE% ^
          -runTests ^
          -testPlatform EditMode ^
          -batchmode ^
          -nographics ^
          -logFile TestResults-Windows.log ^
          -quit

      - name: Upload test results (Windows)
        uses: actions/upload-artifact@v3
        with:
          name: Unity-EditMode-TestResults-Windows
          path: TestResults-Windows.log


exit
